<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hackathon Starter</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="intro">
      <div>
        <p class="eyebrow">Spring Boot Starter</p>
        <h1>Hackathon Starter</h1>
        <p class="lede">Reusable Spring Boot + H2 + AI wrapper starter.</p>
      </div>
      <div class="status-grid" aria-label="Backend status">
        <article class="card">
          <span class="label">Backend</span>
          <strong id="healthStatus">Checking...</strong>
          <small id="healthMeta">/api/health</small>
        </article>
        <article class="card">
          <span class="label">AI Provider</span>
          <strong id="aiStatus">Checking...</strong>
          <small id="aiMeta">/api/ai/status</small>
        </article>
      </div>
    </section>

    <section class="workspace" aria-label="AI test form">
      <form id="aiForm" class="panel">
        <div class="field">
          <label for="mode">Mode</label>
          <select id="mode" name="mode">
            <option value="generate">Generate</option>
            <option value="summarize">Summarize</option>
            <option value="classify">Classify</option>
            <option value="extract_structured">Extract JSON</option>
          </select>
        </div>
        <div class="field">
          <label for="systemPrompt">System prompt</label>
          <input id="systemPrompt" name="systemPrompt" type="text" placeholder="Optional">
        </div>
        <div class="field span">
          <label for="prompt">Prompt</label>
          <textarea id="prompt" name="prompt" rows="7" placeholder="Ask the reusable AI wrapper for a quick test response."></textarea>
        </div>
        <button id="generateButton" type="submit">Generate</button>
      </form>

      <article class="output panel">
        <div class="output-head">
          <h2>Output</h2>
          <span id="outputMeta">Ready</span>
        </div>
        <pre id="outputText">Submit a prompt to test the backend AI wrapper.</pre>
      </article>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
